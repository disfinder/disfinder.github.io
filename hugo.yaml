  ru:
    contentDir: content/ru
    weight: 3
    languageName: "rUꞨꞨIAN"

  en:
    disabled: false
    languageCode: "en-US"
    languageDirection: ""
    languageName: "🇺🇸English"
    title: "disfinder.com 🇺🇸"
    weight: 2
    contentDir: content/en

