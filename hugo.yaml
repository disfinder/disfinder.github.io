baseURL: 'https://www.disfinder.com'
languageCode: 'uk-ua'
title: 'disfinder.com 🇺🇦'
theme: hugo-book

markup:
  goldmark:
    renderer:
      unsafe: true

services:
  disqus:
    shortname: disfinder-com
params:
  BookDateFormat: "January 2, 2006"
  BookRepo: https://github.com/disfinder/disfinder.github.io

defaultContentLanguage: ua
languages:
  ua:
    disabled: false
    languageCode: "uk-UA"
    languageDirection: ""
    languageName: "🇺🇦Ukrainian"
